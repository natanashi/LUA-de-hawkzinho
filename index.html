<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Lua</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script id="vs" type="x-shader/x-vertex">
attribute vec2 aPos;
void main() { gl_Position = vec4(aPos, 0.0, 1.0); }
</script>

<script id="fs" type="x-shader/x-fragment">
#extension GL_OES_standard_derivatives : enable
#ifdef GL_FRAGMENT_PRECISION_HIGH
precision highp float;
#else
precision mediump float;
#endif

uniform vec2  uRes;
uniform float uTime;
uniform float uTanHalf;   // tan(fov/2)
uniform float uPixAng;    // radians per pixel
uniform vec2  uPan;
uniform mat3  uMoonM;     // moon orientation (auto-spin + drag)
uniform mat3  uSkyM;      // sky orientation (drift + drag)
uniform vec3  uSunDir;    // sun direction, in sky space
uniform vec3  uPlanetPos; // planet centre, in sky space
uniform float uPlanetRot; // planet day phase

const vec3  MOON_C = vec3(0.0, 0.0, -7.0);
const float MOON_R = 1.0;

// NASA ratios: the planet is Earth-to-Moon sized (6371/1737 = 3.67 moon radii)
// and its spin axis is tilted 23.4 degrees off the orbit axis, like Earth's.
// Distances are compressed for composition, as in any orrery.
const float PLANET_R = 3.667;
const vec3  PAXIS = vec3(0.5039, 0.8566, 0.1109);

// ---------- hashes (Dave Hoskins, sin-free) ----------
float hash13(vec3 p) {
  p = fract(p * 0.1031);
  p += dot(p, p.zyx + 31.32);
  return fract((p.x + p.y) * p.z);
}
vec3 hash33(vec3 p) {
  p = fract(p * vec3(0.1031, 0.1030, 0.0973));
  p += dot(p, p.yxz + 33.33);
  return fract((p.xxy + p.yxx) * p.zyx);
}
vec3 hash32(vec2 p) {
  vec3 p3 = fract(vec3(p.xyx) * vec3(0.1031, 0.1030, 0.0973));
  p3 += dot(p3, p3.yxz + 33.33);
  return fract((p3.xxy + p3.yzz) * p3.zyx);
}

// ---------- value noise / fbm ----------
float vnoise(vec3 x) {
  vec3 i = floor(x);
  vec3 w = fract(x);
  w = w * w * (3.0 - 2.0 * w);
  float a = hash13(i + vec3(0.0, 0.0, 0.0));
  float b = hash13(i + vec3(1.0, 0.0, 0.0));
  float c = hash13(i + vec3(0.0, 1.0, 0.0));
  float d = hash13(i + vec3(1.0, 1.0, 0.0));
  float e = hash13(i + vec3(0.0, 0.0, 1.0));
  float f = hash13(i + vec3(1.0, 0.0, 1.0));
  float g = hash13(i + vec3(0.0, 1.0, 1.0));
  float h = hash13(i + vec3(1.0, 1.0, 1.0));
  return mix(mix(mix(a, b, w.x), mix(c, d, w.x), w.y),
             mix(mix(e, f, w.x), mix(g, h, w.x), w.y), w.z);
}
float fbm(vec3 p, int oct) {
  float s = 0.0, a = 0.5, n = 0.0;
  for (int i = 0; i < 6; i++) {
    if (i >= oct) break;
    s += a * vnoise(p);
    n += a;
    p *= 2.03;
    a *= 0.5;
  }
  return s / n;
}

mat3 axisRot(vec3 a, float ang) {
  float c = cos(ang), s = sin(ang), t = 1.0 - c;
  return mat3(
    t * a.x * a.x + c,       t * a.x * a.y + s * a.z, t * a.x * a.z - s * a.y,
    t * a.x * a.y - s * a.z, t * a.y * a.y + c,       t * a.y * a.z + s * a.x,
    t * a.x * a.z + s * a.y, t * a.y * a.z - s * a.x, t * a.z * a.z + c
  );
}

// ---------- craters: 3D cellular impact field ----------
float craterLayer(vec3 p, float scale, float seed) {
  vec3 q = p * scale;
  vec3 ip = floor(q);
  vec3 fp = q - ip;
  float h = 0.0;
  for (int x = -1; x <= 1; x++) {
    for (int y = -1; y <= 1; y++) {
      for (int z = -1; z <= 1; z++) {
        vec3 g = vec3(float(x), float(y), float(z));
        vec3 o = hash33(ip + g + seed);
        if (o.z > 0.32) continue;
        vec3 cc = g + 0.15 + o * 0.7;
        float d = length(fp - cc);
        float r = 0.26 + 0.34 * o.x;
        if (d >= r) continue;
        // Flat floor, steep wall, sharp rim. Both terms must reach zero in
        // value AND slope at t = 1, or the step at the crater edge shows up
        // as a hard ring in the normals.
        float t = d / r;
        float depth = -1.0 + smoothstep(0.42, 0.86, t);
        float u = clamp((t - 0.86) / 0.14, -1.0, 1.0);
        float rim = 0.5 + 0.5 * cos(3.14159265 * u);
        float fresh = fract(o.z * 41.7); // old craters have worn their rims away
        h += (depth * 0.95 + rim * 0.36 * fresh) * (0.40 + 0.60 * o.y);
      }
    }
  }
  return h;
}

// Level of detail driven by the on-screen footprint: octaves appear as you zoom.
// The maria are young lava plains, so they swallow the big old craters and keep
// only the fine peppering — that contrast is what stops the surface reading as
// a uniform field of bubbles.
float heightAt(vec3 p, float maxScale, float maria) {
  float h = 0.55 * (fbm(p * 1.3, 4) - 0.5) * mix(1.0, 0.35, maria);
  float sc = 2.4, am = 1.0;
  for (int i = 0; i < 8; i++) {
    if (sc > maxScale) break;
    float att = mix(1.0, clamp(0.10 + float(i) * 0.13, 0.0, 1.0), maria);
    h += am * att * craterLayer(p, sc, float(i) * 37.0 + 5.0);
    sc *= 2.1;
    am *= 0.5;
  }
  // Past the last affordable crater octave, cheap fractal grain carries the
  // relief so deep zoom keeps texture instead of going smooth.
  if (maxScale > sc) h += am * 1.6 * (fbm(p * sc * 0.5, 3) - 0.5);
  return h;
}

vec3 surfaceAlbedo(vec3 p, float h, float maria) {
  vec3 a = mix(vec3(0.86, 0.845, 0.815), vec3(0.25, 0.265, 0.315), maria);
  a *= 0.80 + 0.38 * fbm(p * 7.0, 3);
  a = mix(a, a * 1.35, smoothstep(0.06, 0.42, h));
  return a;
}

// Mikkelsen surface-gradient bump mapping (one height sample per pixel)
vec3 perturbNormal(vec3 pos, vec3 N, float h, float amount) {
  vec3 dpdx = dFdx(pos);
  vec3 dpdy = dFdy(pos);
  float dhdx = dFdx(h);
  float dhdy = dFdy(h);
  vec3 r1 = cross(dpdy, N);
  vec3 r2 = cross(N, dpdx);
  float det = dot(dpdx, r1);
  vec3 grad = sign(det) * (dhdx * r1 + dhdy * r2);
  return normalize(abs(det) * N - amount * grad);
}

// ---------- stars ----------
// The sky is sampled on a cube-face grid (9 cells/layer) rather than a 3D shell
// grid (27 cells/layer) — same look, a third of the cost on every screen pixel.
vec2 cubeFace(vec3 d, out float face, out float axisScale) {
  vec3 a = abs(d);
  vec2 uv;
  if (a.x >= a.y && a.x >= a.z)      { face = d.x > 0.0 ? 0.0 : 1.0; uv = d.yz / a.x; }
  else if (a.y >= a.z)               { face = d.y > 0.0 ? 2.0 : 3.0; uv = d.xz / a.y; }
  else                               { face = d.z > 0.0 ? 4.0 : 5.0; uv = d.xy / a.z; }
  axisScale = 1.0 + dot(uv, uv); // face uv stretches away from the face centre
  return uv;
}

vec3 starLayer(vec2 uv, float face, float scale, float cpp, float prob, float seed) {
  vec2 q = uv * scale;
  vec2 ip = floor(q);
  vec2 fp = q - ip;
  vec3 acc = vec3(0.0);
  for (int x = -1; x <= 1; x++) {
    for (int y = -1; y <= 1; y++) {
      vec2 g = vec2(float(x), float(y));
      vec3 o = hash32(ip + g + vec2(seed + face * 91.7, seed * 1.7 + face * 13.1));
      if (o.z > prob) continue;
      vec2 cc = g + 0.1 + o.xy * 0.8;
      float d = length(fp - cc);
      // radius fixed in pixels, so stars stay points at any magnification
      float rnd = fract(o.z * 71.3);
      float r = (0.60 + 0.80 * rnd) * cpp;
      if (d > r * 3.0) continue;
      float mag = 0.06 + 0.94 * pow(fract(o.z * 313.7), 3.0);
      float core = smoothstep(r, 0.0, d);
      float halo = 0.08 * exp(-d / (r * 1.1));
      float tw = 0.76 + 0.24 * sin(uTime * (0.6 + 2.0 * rnd) + o.z * 250.0);
      vec3 tint = mix(vec3(0.88, 0.93, 1.0), vec3(1.0, 0.97, 0.92), fract(o.z * 7.3));
      acc += tint * (core + halo) * mag * tw;
    }
  }
  return acc;
}

// Fainter layers fade in as the pixel footprint shrinks, so star density on
// screen stays roughly constant while zooming — and the cost stays bounded.
vec3 starField(vec3 rd, float pixAng) {
  float face, axisScale;
  vec2 uv = cubeFace(rd, face, axisScale);
  vec3 col = vec3(0.0);
  float sc = 22.0, amp = 1.0, prob = 0.30;
  for (int i = 0; i < 5; i++) {
    float cpp = pixAng * axisScale * sc; // cells per pixel
    float w = smoothstep(0.34, 0.14, cpp);
    if (w > 0.004) col += amp * w * starLayer(uv, face, sc, cpp, prob, float(i) * 57.0);
    sc *= 2.6;
    amp *= 0.5;
    prob *= 0.45;
  }
  return col;
}

// ---------- meteors ----------
// Drawn in screen space: they cross the view at any zoom, cost a handful of
// dot products, and need no hash loop. Time is cut into slots; most slots fire
// a streak, each with its own path, length and lifetime.
vec3 meteor(vec2 uv, float aspect, float pixUV, float period, float seed) {
  float slot = floor(uTime / period);
  // Keep every hash input away from zero — Hoskins hashes go degenerate there.
  vec3 h1 = hash33(vec3(slot * 1.37 + seed, seed * 3.1 + 11.7, 7.7 + seed * 0.7));
  vec3 h2 = hash33(vec3(slot * 2.11 + seed * 1.9 + 5.3, seed * 5.7 + 2.9, 3.3 + seed));
  if (h1.z > 0.62) return vec3(0.0);

  float life = 0.55 + 0.60 * h2.z;
  float t0 = h1.x * max(period - life, 0.01);
  float lt = uTime - slot * period - t0;
  if (lt < 0.0 || lt > life) return vec3(0.0);
  float u = lt / life;

  vec2 p0 = vec2((h1.y - 0.5) * (aspect + 0.6), 0.24 + 0.48 * fract(h1.x * 23.1));
  float ang = -0.75 - 1.65 * h2.x;              // always heading downward
  vec2 dir = vec2(cos(ang), sin(ang));
  vec2 head = p0 + dir * (0.75 + 0.75 * h2.y) * u;
  float trail = 0.09 + 0.15 * fract(h2.z * 13.7);

  vec2 q = uv - head;
  float aRaw = dot(q, -dir);                    // >0 behind the head
  float perp = length(q + dir * clamp(aRaw, 0.0, trail));

  // Tight head, and a trail that fades out instead of stopping dead.
  float s = max(aRaw, 0.0) / trail;             // 0 at the head, 1 at the tail
  float taper = exp(-s * 2.6) * (1.0 - smoothstep(0.6, 1.0, s));
  float w = pixUV * 1.6 * (0.45 + 0.55 * taper); // trail narrows toward the tail
  float core = smoothstep(w, 0.0, perp) * taper;
  float glow = exp(-perp / (pixUV * 2.5)) * 0.12 * taper;
  float hd = exp(-length(q) / (pixUV * 1.2)) * 1.4;

  float env = smoothstep(0.0, 0.10, u) * (1.0 - smoothstep(0.45, 1.0, u));
  env *= 0.72 + 0.28 * sin(uTime * 52.0 + h1.z * 40.0); // meteors flicker

  vec3 tint = mix(vec3(0.72, 0.88, 1.0), vec3(1.0, 0.88, 0.65), h2.y);
  return ((core + glow) * tint + hd * vec3(1.0, 0.98, 0.94))
         * env * (0.6 + 0.7 * fract(h1.y * 11.7));
}

vec3 aces(vec3 x) {
  return clamp((x * (2.51 * x + 0.03)) / (x * (2.43 * x + 0.59) + 0.14), 0.0, 1.0);
}

void main() {
  vec2 uv = (gl_FragCoord.xy - 0.5 * uRes) / uRes.y;
  vec3 rd = normalize(vec3(uv * 2.0 * uTanHalf + uPan, -1.0));
  vec3 ro = vec3(0.0);

  vec3 cdir = normalize(MOON_C);
  float angR = asin(MOON_R / length(MOON_C));
  float ang = acos(clamp(dot(rd, cdir), -1.0, 1.0));

  // ---- background sky ----
  vec3 srd = uSkyM * rd;

  vec3 col = vec3(0.0030, 0.0038, 0.0072);
  float neb = fbm(srd * 2.2 + vec3(3.1), 5);
  col += vec3(0.028, 0.038, 0.070) * pow(smoothstep(0.42, 0.95, neb), 2.5) * 0.40;
  col += starField(srd, uPixAng);

  float aspect = uRes.x / uRes.y;
  float pixUV = 1.0 / uRes.y;
  col += meteor(uv, aspect, pixUV, 7.0, 0.0);
  col += meteor(uv, aspect, pixUV, 11.0, 4.0);

  // ---- sun ----
  // Opaque disc with real limb darkening, plus an additive corona. It lives in
  // sky space, so dragging swings it with the stars — and every phase you see
  // on the moon and planet follows from where it actually is.
  float angS = acos(clamp(dot(srd, uSunDir), -1.0, 1.0));
  float SUN_R = 0.038;
  if (angS < SUN_R * 16.0) {
    float covS = smoothstep(SUN_R + uPixAng * 2.0, SUN_R - uPixAng * 2.0, angS);
    if (covS > 0.0) {
      float mu = sqrt(max(1.0 - (angS * angS) / (SUN_R * SUN_R), 0.0));
      float limb = 0.34 + 0.66 * pow(mu, 0.55);
      vec3 sc = vec3(1.0, 0.92, 0.78) * 7.0 * limb;
      sc *= 0.95 + 0.10 * fbm(srd * 150.0 + uTime * 0.02, 3);
      col = mix(col, sc, covS);
    }
    float eS = max(angS - SUN_R, 0.0) / SUN_R;
    float cor = 0.9 * exp(-eS * 3.0) + 0.13 * exp(-eS * 0.6);
    cor *= 0.85 + 0.30 * fbm(srd * 6.0 + uTime * 0.004, 3);
    col += vec3(1.0, 0.86, 0.66) * cor * 0.5 * (1.0 - covS);
  }

  // ---- planet: blue oceans, red continents ----
  {
    float pd2 = dot(uPlanetPos, uPlanetPos);
    vec3 pdir = uPlanetPos * inversesqrt(pd2);
    float angP = acos(clamp(dot(srd, pdir), -1.0, 1.0));
    float angRP = asin(clamp(PLANET_R * inversesqrt(pd2), 0.0, 1.0));
    if (angP < angRP + uPixAng * 2.0) {
      float b = -dot(uPlanetPos, srd);
      float dd = b * b - (pd2 - PLANET_R * PLANET_R);
      vec3 N = (srd * (-b - sqrt(max(dd, 0.0))) - uPlanetPos) / PLANET_R;
      vec3 pr = axisRot(PAXIS, uPlanetRot) * N;

      float cont = fbm(pr * 1.7 + 11.3, 5);
      float land = smoothstep(0.495, 0.535, cont);
      vec3 alb = vec3(0.030, 0.095, 0.30) * (0.75 + 0.55 * smoothstep(0.32, 0.50, cont));
      alb = mix(alb, mix(vec3(0.46, 0.065, 0.045), vec3(0.80, 0.16, 0.075), fbm(pr * 5.3, 3)), land);
      float lat = abs(dot(N, PAXIS));
      alb = mix(alb, vec3(0.92, 0.94, 0.96), smoothstep(0.80, 0.90, lat + 0.06 * (cont - 0.5)));

      // clouds slide against the ground below them
      float cl = smoothstep(0.52, 0.74, fbm(axisRot(PAXIS, uPlanetRot * 0.92) * N * 3.1 + 4.7, 4));
      float oceanFree = (1.0 - land) * (1.0 - cl);
      alb = mix(alb, vec3(0.97, 0.98, 1.0), cl * 0.9);

      float ndlP = dot(N, uSunDir);
      float dayP = max(ndlP, 0.0);
      vec3 cp = alb * dayP * 1.25 * vec3(1.0, 0.97, 0.92);
      vec3 Vp = -srd;
      cp += vec3(1.0, 0.95, 0.85) * pow(max(dot(reflect(-uSunDir, N), Vp), 0.0), 140.0)
            * oceanFree * 0.45 * dayP;                         // sun glint on open sea
      cp += vec3(0.22, 0.42, 0.95) * pow(1.0 - max(dot(N, Vp), 0.0), 2.6)
            * (0.10 + 0.75 * dayP);                            // Rayleigh rim
      cp += alb * vec3(0.010, 0.012, 0.022);                   // night side

      float covP = smoothstep(angRP + uPixAng, angRP - uPixAng, angP);
      col = mix(col, cp, covP);
    }
    // thin atmosphere glow past the limb
    float ePl = max(angP - angRP, 0.0) / max(angRP, 1e-4);
    col += vec3(0.20, 0.38, 0.90) * 0.06 * exp(-ePl * 26.0);
  }

  // All light in the scene comes from the sun. The moon shades in view space,
  // so pull the sun's direction back through the sky orientation (v*M is
  // transpose(M)*v for an orthonormal M).
  vec3 L = normalize(uSunDir * uSkyM);

  // ---- moon halo ----
  float e = max(ang - angR, 0.0) / max(angR, 1e-4);
  float halo = 0.13 * exp(-e * 22.0) + 0.020 * exp(-e * 6.5) + 0.004 * exp(-e * 2.2);
  halo *= 1.0 + 0.07 * sin(uTime * 0.31);
  // Only the lit limb throws a glow — a gibbous moon isn't backlit.
  vec3 perp = normalize(rd - cdir * dot(rd, cdir) + vec3(1e-6));
  vec3 lperp = normalize(L - cdir * dot(L, cdir) + vec3(1e-6));
  halo *= mix(0.18, 1.0, smoothstep(-0.75, 0.45, dot(perp, lperp)));
  col += vec3(0.62, 0.72, 0.96) * halo;

  // ---- moon ----
  vec3 oc = ro - MOON_C;
  float b = dot(oc, rd);
  float c = dot(oc, oc) - MOON_R * MOON_R;
  float disc = b * b - c;

  if (disc > -0.05) {
    float t = -b - sqrt(max(disc, 0.0));
    vec3 pos = ro + rd * t;
    vec3 N = normalize(pos - MOON_C);

    vec3 sp = uMoonM * N;

    // Keep the finest relief a few pixels wide: finer than that and the
    // derivative-based normals alias into speckle along the terminator.
    float foot = max(length(dFdx(pos)), length(dFdy(pos)));
    float maxScale = 0.24 / max(foot, 1e-5);

    float maria = smoothstep(0.47, 0.63, fbm(sp * 2.1 + vec3(19.3, 4.1, 7.7), 4));
    float h = heightAt(sp, maxScale, maria);
    vec3 Nb = perturbNormal(pos, N, h, 0.030);

    vec3 alb = surfaceAlbedo(sp, h, maria);
    vec3 V = -rd;

    float ndl = dot(Nb, L);
    float ndv = max(dot(Nb, V), 0.0);
    float lam = max(ndl, 0.0);
    float ls = lam / max(lam + ndv, 0.001);
    float shade = mix(lam, ls * 1.05, 0.7);
    shade *= smoothstep(-0.10, 0.18, ndl);

    vec3 moon = alb * shade * vec3(1.0, 0.985, 0.95) * 1.02;
    moon += alb * vec3(0.013, 0.017, 0.032) * smoothstep(0.25, -0.6, ndl);

    float cov = smoothstep(angR + uPixAng, angR - uPixAng, ang);
    col = mix(col, moon, cov);
  }

  // ---- grade ----
  float vig = smoothstep(1.35, 0.30, length(uv * 1.55));
  col *= mix(0.72, 1.0, vig);
  col = aces(col * 1.02);
  col = pow(col, vec3(1.0 / 2.2));
  col += (hash13(vec3(gl_FragCoord.xy, uTime)) - 0.5) / 255.0;

  gl_FragColor = vec4(col, 1.0);
}
</script>

<script>
(function () {
  'use strict';

  var canvas = document.getElementById('c');
  var gl = canvas.getContext('webgl', {
    antialias: false, alpha: false, depth: false, stencil: false,
    powerPreference: 'high-performance'
  }) || canvas.getContext('experimental-webgl');
  if (!gl) return;
  gl.getExtension('OES_standard_derivatives');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(s));
      return null;
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, document.getElementById('vs').textContent));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, document.getElementById('fs').textContent));
  gl.bindAttribLocation(prog, 0, 'aPos');
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(prog));
    return;
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

  var U = {};
  ['uRes', 'uTime', 'uTanHalf', 'uPixAng', 'uPan', 'uMoonM', 'uSkyM',
   'uSunDir', 'uPlanetPos', 'uPlanetRot']
    .forEach(function (n) { U[n] = gl.getUniformLocation(prog, n); });

  // ---------- quaternions ----------
  // The sky carries a full 3D orientation now, so it can be spun any which way
  // by dragging. Accumulating a quaternion (rather than a matrix) keeps it from
  // drifting out of shape over a long session.
  function qMul(a, b) {
    return [
      a[3] * b[0] + a[0] * b[3] + a[1] * b[2] - a[2] * b[1],
      a[3] * b[1] - a[0] * b[2] + a[1] * b[3] + a[2] * b[0],
      a[3] * b[2] + a[0] * b[1] - a[1] * b[0] + a[2] * b[3],
      a[3] * b[3] - a[0] * b[0] - a[1] * b[1] - a[2] * b[2]
    ];
  }
  function qAxis(x, y, z, ang) {
    var s = Math.sin(ang * 0.5);
    return [x * s, y * s, z * s, Math.cos(ang * 0.5)];
  }
  function qNorm(q) {
    var l = Math.sqrt(q[0] * q[0] + q[1] * q[1] + q[2] * q[2] + q[3] * q[3]) || 1;
    return [q[0] / l, q[1] / l, q[2] / l, q[3] / l];
  }
  var _m9 = new Float32Array(9);
  function qToMat3(q) {
    var x = q[0], y = q[1], z = q[2], w = q[3];
    _m9[0] = 1 - 2 * (y * y + z * z); _m9[1] = 2 * (x * y + z * w); _m9[2] = 2 * (x * z - y * w);
    _m9[3] = 2 * (x * y - z * w); _m9[4] = 1 - 2 * (x * x + z * z); _m9[5] = 2 * (y * z + x * w);
    _m9[6] = 2 * (x * z + y * w); _m9[7] = 2 * (y * z - x * w); _m9[8] = 1 - 2 * (x * x + y * y);
    return _m9;
  }

  // ---------- state ----------
  var FOV0 = 0.55;                 // vertical field of view at zoom 1 (radians)
  var MOON_TAN = 0.14434;          // tan(angular radius) of the moon, at z = -7
  var ZMIN = 0.6, ZMAX = 14.0;

  var zoom = 1.0, zoomTarget = 1.0;
  var panX = 0.0, panY = 0.0;
  var curU = 0.0, curV = 0.0;      // cursor in uv space (y up)

  // ---- the system (sky space, NASA-proportioned) ----
  // You hover over the moon's near side. The sky — sun, planet, stars — wheels
  // overhead once per (scaled) lunar month while the tidally locked moon turns
  // under you at the same rate, so the planet never wanders from the face it
  // owns. The planet spins 27.32x faster: its 24h day against the 27.32-day
  // month (NASA). One real second here is about five simulated minutes; at
  // that scale the planet's day takes ~4.8 min and everything else is slower.
  var SUN_DIR = [-0.5507, 0.4206, 0.7210]; // ~130 deg off-view: gibbous moon
  var PLANET_POS = [12.0, 6.4, -37.6];     // upper right, 3.667 moon radii wide
  var W_ORBIT = 0.0008;                    // lunar month -> 2.2 h on screen
  var W_DAY = W_ORBIT * 27.32;             // planet day  -> 4.8 min on screen
  var planetRot = 0.0;

  var moonQ = [0, 0, 0, 1];        // moon orientation
  var skyQ = [0, 0, 0, 1];         // sky orientation
  var pendX = 0, pendY = 0;        // drag rotation banked since the last frame
  var spinVX = 0, spinVY = 0;      // rad/s, carries the throw after release
  var hist = [];                   // recent drag samples, for the release velocity

  // Velocity comes from the pointer's own history over the last ~110ms, not from
  // whatever landed in the last rendered frame: at any frame rate a single
  // still frame before release would otherwise wipe the throw out.
  function releaseThrow() {
    var t = performance.now(), ax = 0, ay = 0, t0 = -1;
    for (var i = 0; i < hist.length; i++) {
      if (t - hist[i].t <= 110) {
        if (t0 < 0) t0 = hist[i].t;
        ax += hist[i].ax;
        ay += hist[i].ay;
      }

    }
    hist.length = 0;
    var span = (t - t0) / 1000;
    if (t0 < 0 || span < 0.008) { spinVX = spinVY = 0; return; }

    spinVY = ay / span;

  // Rotate sky and moon by view-space angles. Both should follow the cursor, so
  // each mapping (view->sky, view->moon surface) gets the inverse of the

  //

  // sphere of radius 1 sitting 7 units away, so turning it by an angle sweeps
  // its surface across far fewer pixels than turning the sky by that same

    var maxPan = MOON_TAN * 3.0 * Math.max(0, 1 - 1 / zoom);
    var d = Math.sqrt(panX * panX + panY * panY);
    if (d > maxPan && d > 0) {
      panX *= maxPan / d;
      panY *= maxPan / d;
    }
  }

  function resize() {
    var w = Math.max(1, Math.round(canvas.clientWidth * scale));
    var h = Math.max(1, Math.round(canvas.clientHeight * scale));
    if (w === W && h === H) return;
    W = canvas.width = w;
    H = canvas.height = h;
    gl.viewport(0, 0, W, H);
  }
  window.addEventListener('resize', resize);

  // ---------- input ----------
  function setCursor(x, y) {
    var r = canvas.getBoundingClientRect();
    curU = (x - r.left - r.width * 0.5) / r.height;
    curV = -(y - r.top - r.height * 0.5) / r.height;
  }

  canvas.addEventListener('wheel', function (e) {
    e.preventDefault();
    setCursor(e.clientX, e.clientY);
    var d = e.deltaMode === 1 ? e.deltaY * 16 : (e.deltaMode === 2 ? e.deltaY * 400 : e.deltaY);
    zoomTarget *= Math.exp(-d * 0.0016);
    zoomTarget = Math.min(ZMAX, Math.max(ZMIN, zoomTarget));
  }, { passive: false });

  var dragging = false, lastX = 0, lastY = 0, pinch = 0;
  var pointers = {};

  canvas.addEventListener('pointerdown', function (e) {
    pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
    if (Object.keys(pointers).length === 1) {
      dragging = true;
      lastX = e.clientX;
      lastY = e.clientY;
      setCursor(e.clientX, e.clientY);
      spinVX = 0; spinVY = 0; hist.length = 0;   // grabbing halts any coast
      canvas.style.cursor = 'grabbing';
    } else {
      dragging = false;
      pinch = pinchDist();
    }
    canvas.setPointerCapture(e.pointerId); // last: a capture failure must not kill the drag
  });

  canvas.addEventListener('pointermove', function (e) {
    setCursor(e.clientX, e.clientY);
    if (!pointers[e.pointerId]) return;
    pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
    var n = Object.keys(pointers).length;

    if (n === 1 && dragging) {
      var r = canvas.getBoundingClientRect();
      var k = 2 * tanHalf(zoom) / r.height;   // ~radians per pixel
      var dx = e.clientX - lastX, dy = e.clientY - lastY;
      pendY += -dx * k;
      pendX += -dy * k;

      if (hist.length > 16) hist.shift();

    gl.uniformMatrix3fv(U.uSkyM, false, qToMat3(skyQ));

    gl.uniform3f(U.uPlanetPos, PLANET_POS[0], PLANET_POS[1], PLANET_POS[2]);
    gl.uniform1f(U.uPlanetRot, planetRot);

    // oscillate or stall the page the way a two-way one can.
    acc += dt; frames++;

      var avg = acc / frames;
      acc = 0; frames = 0;
      if (avg > 0.026 && scale > 0.6) {
        scale = Math.max(0.6, scale - 0.2);
        W = H = 0;
      }
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
